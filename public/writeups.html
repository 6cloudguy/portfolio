<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Writeups — Pranav P</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-bar">
      <a class="brand" href="/" aria-label="Home">
        <div class="brand-name">Pranav P</div>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/projects.html">Projects</a>
        <a class="nav-link" href="/writeups.html">Writeups</a>
        <a class="nav-link" href="/contact.html">Contact</a>
      </nav>
      <button class="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
    <div id="mobile-menu" class="mobile-menu-panel" hidden>
      <ul class="mobile-menu-list" role="menu">
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/">Home</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/projects.html">Projects</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/writeups.html">Writeups</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Security Writeups</h1>
    <p class="section-subtitle">Deep dives into penetration testing challenges and vulnerability research</p>
    <div class="projects-grid" id="writeups-grid" aria-live="polite"></div>
    <div class="controls">
      <a id="prev" href="#" class="btn" aria-label="Previous page">← Previous</a>
      <a id="next" href="#" class="btn" aria-label="Next page">Next →</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-note">🚧 Built with caffeine & curiosity | v2.16<br>© 2025 Pranav P. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function(){
      const data = [
        { id:'strutted',src:'htb',in:'git', title:'HTB — Strutted (Linux)', desc:'File upload vulnerabilities and classic privilege escalation techniques explored in this Linux-based challenge.', tags:['Recon','Web','Linux','Upload'] },
        { id:'jangow1',src:'VMs',in:'git', title:'VulnHub — Jangow01 (Linux)', desc:'Command injection vulnerabilities leading to DirtyCow exploit for privilege escalation.', tags:['Linux','FTP','Command Injection'] },
        { id:'Me_and_My_Girlfriend_1',src:'VMs',in:'git', title:'VulnHub — Me & My Girlfriend (Linux)', desc:'Multiple attack vectors from IDOR to running PHP as root user for complete system compromise.', tags:['Web','Linux','IDOR','PHP'] },
        { id:'editor',src:'htb',in:'git', title:'HTB — Editor(Linux)', desc:'RCE through xWiki macro to passwords in plaintext and sudo permissions leading to root.', tags:['Linux','Web','RCE','HTB'] },
        { id:'artificial',src:'htb',in:'git', title:'HTB — Artificial(Linux)', desc:'Additional HackTheBox writeups currently in development. Stay tuned for more detailed walkthroughs.', tags:['Coming Soon','HTB'] },
        //{ id:'coming-soon-2',src:'VMs',in:'git', title:'VulnHub — Advanced Boxes', desc:'Complex multi-stage penetration testing scenarios and advanced exploitation techniques.', tags:['Coming Soon','Advanced'] },
        //{ id:'coming-soon-3',src:'tryhackme',in:'git', title:'TryHackMe CTF Rooms', desc:'Capture The Flag challenges covering various cybersecurity domains and methodologies.', tags:['Coming Soon','CTF'] }
      ];

      const grid = document.getElementById('writeups-grid');
      const prev = document.getElementById('prev');
      const next = document.getElementById('next');

      const pageSize = 9; let page = 0; const pages = Math.ceil(data.length / pageSize);

      function card(item){
        const tags = item.tags.map(t=>`<span class='tech-badge'>${t}</span>`).join('');
        const isComingSoon = item.tags.includes('Coming Soon');
        const buttonText = isComingSoon ? '⏳ Coming Soon' : '📖 Read Writeup';
        const buttonClass = isComingSoon ? 'btn btn--coming-soon' : 'btn btn--linkedin';
        const href = isComingSoon ? '#' : ((item.in=='git')?`https://github.com/6cloudguy/box-writeups/blob/main/${encodeURIComponent(item.src)}/${encodeURIComponent(item.id)}/README.md`:`https://medium.com/@6cloudguy/${encodeURIComponent(item.id)}`);
        const target = isComingSoon ? '' : 'target="_blank" rel="noopener noreferrer"';
        
        return `
          <article class="project-card ${isComingSoon ? 'coming-soon' : ''}" aria-labelledby="wu-${item.id}">
            <h2 id="wu-${item.id}" class="project-title">${item.title}</h2>
            <p class="project-desc">${item.desc}</p>
            <div class="tech-list">${tags}</div>
            <div class="project-actions">
              <a class="${buttonClass}" href="${href}" ${target} aria-label="${isComingSoon ? 'Coming soon' : `Read ${item.title} writeup on GitHub`}">
                ${buttonText}
              </a>
            </div>
          </article>`;
      }

      function render(){
        const start = page * pageSize; 
        const end = Math.min(start + pageSize, data.length);
        grid.innerHTML = data.slice(start, end).map(card).join('');
        
        // Add stagger animation
        const cards = grid.querySelectorAll('.project-card');
        cards.forEach((card, index) => {
          card.style.animationDelay = `${index * 0.1}s`;
        });
        
        prev.style.visibility = page <= 0 ? 'hidden' : 'visible';
        next.style.visibility = page >= pages - 1 ? 'hidden' : 'visible';
      }

      prev.addEventListener('click', e => { 
        e.preventDefault(); 
        if (page > 0) { 
          page--; 
          render(); 
          grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } 
      });
      
      next.addEventListener('click', e => { 
        e.preventDefault(); 
        if (page < pages - 1) { 
          page++; 
          render(); 
          grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } 
      });
      
      render();

      // Mobile menu functionality
      const toggle = document.querySelector('.menu-toggle');
      const panel = document.getElementById('mobile-menu');
      
      if(toggle && panel){
        function closeMenu(){ 
          panel.hidden = true; 
          toggle.setAttribute('aria-expanded','false'); 
        }
        
        function openMenu(){ 
          panel.hidden = false; 
          toggle.setAttribute('aria-expanded','true'); 
        }
        
        toggle.addEventListener('click', ()=>{
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          expanded ? closeMenu() : openMenu();
        });
        
        panel.addEventListener('click', (e)=>{ 
          const a = e.target.closest('a'); 
          if(a) closeMenu(); 
        });
        
        document.addEventListener('keyup', (e)=>{ 
          if(e.key==='Escape') closeMenu(); 
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
          if (!toggle.contains(e.target) && !panel.contains(e.target)) {
            closeMenu();
          }
        });
      }

      // Add smooth reveal animation on scroll
      const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, observerOptions);

      // Observe all cards when they're rendered
      const originalRender = render;
      render = function() {
        originalRender();
        setTimeout(() => {
          grid.querySelectorAll('.project-card').forEach(card => {
            observer.observe(card);
          });
        }, 100);
      };
    })();
  </script>
</body>
</html>
