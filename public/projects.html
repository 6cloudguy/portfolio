<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — Pranav P</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-bar">
      <a class="brand" href="/" aria-label="Home">
        <div class="brand-name">Pranav P</div>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/projects.html">Projects</a>
        <a class="nav-link" href="/writeups.html">Writeups</a>
        <a class="nav-link" href="/contact.html">Contact</a>
      </nav>
      <button class="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
    <div id="mobile-menu" class="mobile-menu-panel" hidden>
      <ul class="mobile-menu-list" role="menu">
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/">Home</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/projects.html">Projects</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/writeups.html">Writeups</a></li>
        <li role="none"><a role="menuitem" class="mobile-menu-link" href="/contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Projects</h1>
    <div class="projects-grid" id="projects-grid"></div>
  </main>

  <footer class="site-footer">
    <p class="footer-note">🚧 Built with caffeine & curiosity | v2.16<br>© 2025 Pranav P. All rights reserved.</p>
  </footer>

  <script>
    (function(){
      const projects = [
        { id:'portfolio', title:'Responsive Portfolio', desc:'Accessible personal portfolio with micro‑interactions and mobile friendly layout.', tech:['HTML','CSS','JavaScript'], code:'#'},
        { id:'autofn', title:'AutoFn', desc:'An automated bash-based recon tool for subdomain enumeration, port scanning, dir brute-forcing, and CVE lookup.', tech:['nmap','ffuf','assetfinder','searchsploit'],  code:'https://github.com/6cloudguy/autofn' },
        //{ id:'ui-kit', title:'E‑commerce UI Kit', desc:'Reusable components library with theming and motion states.', tech:['Design Systems','CSS','Performance'],  code:'#' }
      ];
      const grid = document.getElementById('projects-grid');
      function card(p){
        const tech = p.tech.map(t=>`<span class='tech-badge'>${t}</span>`).join('');
        const url = p.code != '#' ?`<a class="btn btn--linkedin" href="${p.code}" target=_blank aria-label="View ${p.title} code">Code</a>`:'';
        return `
          <article class="project-card" aria-labelledby="p-${p.id}">
            <h2 id="p-${p.id}" class="project-title">${p.title}</h2>
            <p class="project-desc">${p.desc}</p>
            <div class="tech-list">${tech}</div>
            <div class="project-actions">
            ${url}
            </div>
          </article>`;
      }
      grid.innerHTML = projects.map(card).join('');

      const toggle = document.querySelector('.menu-toggle');
      const panel = document.getElementById('mobile-menu');
      if(toggle && panel){
        function closeMenu(){ panel.hidden = true; toggle.setAttribute('aria-expanded','false'); }
        function openMenu(){ panel.hidden = false; toggle.setAttribute('aria-expanded','true'); }
        toggle.addEventListener('click', ()=>{
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          expanded ? closeMenu() : openMenu();
        });
        panel.addEventListener('click', (e)=>{ const a = e.target.closest('a'); if(a) closeMenu(); });
        document.addEventListener('keyup', (e)=>{ if(e.key==='Escape') closeMenu(); });
      }
    })();
  </script>
</body>
</html>
