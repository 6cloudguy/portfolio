<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(ellipse at center, #0f172a 0%, #000000 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .error-code, h1, p, .links, .home-btn {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s ease forwards;
    }

    .error-code {
      font-size: 8rem;
      font-weight: bold;
      color: #ef4444;
      text-shadow: 0 0 20px #ef4444, 0 0 40px #ef444440;
      margin-bottom: 1rem;
      animation-delay: 0.2s;
      line-height: 0.8;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #38bdf8;
      animation-delay: 0.4s;
    }

    p {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-bottom: 2rem;
      animation-delay: 0.6s;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      background: #0a66c2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 12px #0a66c2;
      transition: 0.3s;
      margin-bottom: 2rem;
      animation-delay: 0.8s;
    }

    .home-btn:hover {
      background: #004182;
      box-shadow: 0 0 16px #38bdf8, 0 0 6px #38bdf8 inset;
      transform: translateY(-2px);
    }

    .home-btn svg {
      fill: white;
      height: 20px;
      width: 20px;
    }

    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation-delay: 1s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      background: #0a66c2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 12px #0a66c2;
      transition: 0.3s;
    }

    .btn:hover {
      background: #004182;
      box-shadow: 0 0 16px #38bdf8, 0 0 6px #38bdf8 inset;
    }

    .btn svg {
      fill: white;
      height: 20px;
      width: 20px;
    }

    .error-animation {
      position: relative;
    }

    .error-animation::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border: 2px solid #ef444420;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    /* 📱 Mobile responsiveness */
    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      h1 { font-size: 1.8rem; }
      p { font-size: 1rem; }
      .btn, .home-btn { padding: 10px 16px; font-size: 0.9rem; }
      .btn svg, .home-btn svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>
  <div class="error-code error-animation">404</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page got lost in cyberspace.<br />Let's get you back on track.</p>

  <a href="/" class="home-btn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    Back to Home
  </a>
  <p style="margin-top: 3rem; color: #94a3b8; font-size: 0.75rem;">
  🚧 Built with caffeine & curiosity | v0.1 <br><br>
  © 2025 Pranav P. All rights reserved.</p>
</body>
</html>
